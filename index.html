<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>✈ Travel Edit</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap');
:root{
  --bg:#0a0a0c;--surface:#131318;--s2:#1c1c24;--border:#25252f;
  --accent:#c8ff00;--a2:#ff5c35;--blue:#5b8cff;--green:#3ddc84;
  --text:#ececec;--muted:#5a5a6a;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;height:100dvh;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow:hidden;overscroll-behavior:none}
.app{display:flex;flex-direction:column;height:100dvh}
/* topbar */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 18px;padding-top:max(12px,env(safe-area-inset-top));background:rgba(10,10,12,.96);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);flex-shrink:0;z-index:50}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.05rem;letter-spacing:-.02em;color:var(--accent)}
.logo span{color:var(--text)}
.tbr{display:flex;gap:8px}
.ibtn{background:var(--s2);border:1px solid var(--border);border-radius:8px;color:var(--text);width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:1rem;cursor:pointer;transition:.15s}
.ibtn:active{opacity:.7;transform:scale(.93)}
/* content */
.content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;overscroll-behavior-y:contain}
/* preview */
.pvwrap{background:#000;position:relative;aspect-ratio:16/9;width:100%;display:flex;align-items:center;justify-content:center;overflow:hidden}
.pvwrap img,.pvwrap video{width:100%;height:100%;object-fit:contain;display:none}
.pvempty{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;width:100%;height:100%;color:var(--muted)}
.pvempty .ei{font-size:2.5rem;opacity:.3}
.pvempty p{font-size:.8rem;text-align:center;line-height:1.5}
.tlov{position:absolute;inset:0;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.85)}
.tlov .tt{font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(1.2rem,5vw,2rem);color:#fff;text-align:center;padding:0 24px}
.wmlabel{position:absolute;bottom:8px;right:12px;font-size:.65rem;color:rgba(255,255,255,.4);display:none}
/* prev nav */
.pvnav{display:flex;align-items:center;padding:8px 16px;gap:8px;background:var(--surface);border-bottom:1px solid var(--border)}
.pnbtn{background:var(--s2);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:7px 14px;font-size:.82rem;cursor:pointer}
.pnbtn:active{opacity:.7}
.ccount{margin-left:auto;font-size:.75rem;color:var(--muted);font-family:'Syne',sans-serif}
/* section */
.sec{padding:16px;border-bottom:1px solid var(--border)}
.shead{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.stit{font-family:'Syne',sans-serif;font-size:.72rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
.sact{font-size:.75rem;color:var(--accent);cursor:pointer;padding:4px 8px;border-radius:6px;background:rgba(200,255,0,.08)}
.sact:active{opacity:.7}
/* upload */
.upz{border:1.5px dashed var(--border);border-radius:12px;padding:22px;text-align:center;cursor:pointer;transition:.2s}
.upz.drag-over{border-color:var(--accent);background:rgba(200,255,0,.04)}
.upz p{font-size:.8rem;color:var(--muted);line-height:1.5}
.upz strong{color:var(--accent)}
.upicon{font-size:2rem;margin-bottom:6px}
/* media scroll */
.mscr{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch;scrollbar-width:none;margin-top:10px}
.mscr::-webkit-scrollbar{display:none}
.mth{flex-shrink:0;width:90px;height:64px;border-radius:8px;overflow:hidden;position:relative;border:1.5px solid var(--border);cursor:pointer;background:var(--s2);display:flex;align-items:center;justify-content:center}
.mth:active{opacity:.8;transform:scale(.96)}
.mth img,.mth video{width:100%;height:100%;object-fit:cover;pointer-events:none}
.tbadge{position:absolute;top:3px;left:3px;background:rgba(0,0,0,.7);border-radius:3px;padding:1px 4px;font-size:.58rem;font-family:'Syne',sans-serif;font-weight:700}
.tbadge.photo{color:var(--accent)}.tbadge.video{color:var(--a2)}
.tdur{position:absolute;bottom:3px;right:4px;font-size:.58rem;color:#fff;opacity:.8;font-weight:600}
.trm{position:absolute;top:2px;right:2px;width:18px;height:18px;background:rgba(255,60,60,.85);border:none;border-radius:50%;color:#fff;font-size:.55rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
/* timeline */
.tlscr{display:flex;gap:6px;overflow-x:auto;padding:4px 2px 8px;-webkit-overflow-scrolling:touch;scrollbar-width:none;align-items:center;min-height:52px}
.tlscr::-webkit-scrollbar{display:none}
.tlc{flex-shrink:0;height:40px;border-radius:8px;display:flex;align-items:center;gap:5px;padding:0 10px;font-size:.7rem;cursor:pointer;border:1.5px solid transparent;white-space:nowrap;min-width:56px}
.tlc:active{opacity:.75}
.tlc.act{border-color:rgba(255,255,255,.5)}
.c-photo{background:rgba(200,255,0,.12);color:var(--accent)}
.c-video{background:rgba(255,92,53,.12);color:var(--a2)}
.c-title{background:rgba(91,140,255,.15);color:var(--blue)}
.tlrm{background:none;border:none;color:inherit;font-size:.7rem;opacity:.5;cursor:pointer;padding:0;margin-left:2px}
.tlempty{font-size:.75rem;color:var(--muted);padding:8px 4px}
/* fields */
.field{margin-bottom:14px}
.field label{display:block;font-size:.7rem;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);font-weight:600;margin-bottom:5px}
.field input[type=text],.field input[type=number],.field select,.field textarea{width:100%;background:var(--s2);border:1px solid var(--border);border-radius:9px;color:var(--text);padding:10px 13px;font-family:'DM Sans',sans-serif;font-size:.9rem;outline:none;-webkit-appearance:none;appearance:none}
.field input:focus,.field select:focus{border-color:var(--accent)}
.field input[type=range]{width:100%;accent-color:var(--accent)}
/* BGM cards */
.bgm-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.bgm-card{background:var(--s2);border:1.5px solid var(--border);border-radius:10px;padding:12px;cursor:pointer;transition:.15s;position:relative}
.bgm-card.selected{border-color:var(--accent);background:rgba(200,255,0,.06)}
.bgm-card:active{opacity:.8}
.bgm-card .bcname{font-family:'Syne',sans-serif;font-weight:700;font-size:.78rem;color:var(--text);margin-bottom:4px}
.bgm-card .bcdesc{font-size:.68rem;color:var(--muted);line-height:1.4}
.bgm-card .bcbpm{position:absolute;top:10px;right:10px;font-size:.62rem;color:var(--accent);font-family:'Syne',sans-serif;font-weight:700}
.bgm-card .bcplay{margin-top:8px;background:none;border:1px solid var(--border);border-radius:6px;color:var(--text);padding:4px 10px;font-size:.72rem;cursor:pointer;width:100%}
.bgm-card.selected .bcplay{border-color:var(--accent);color:var(--accent)}
.bgm-upload-also{border:1.5px dashed var(--border);border-radius:10px;padding:12px;text-align:center;cursor:pointer;position:relative;margin-top:4px}
.bgm-upload-also p{font-size:.78rem;color:var(--muted)}
.bgm-ok{font-size:.8rem;color:var(--green);margin-top:6px}
/* sheet */
.shov{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:none;align-items:flex-end}
.shov.open{display:flex}
.sheet{width:100%;background:var(--surface);border-radius:18px 18px 0 0;padding:0 20px 20px;padding-bottom:max(20px,env(safe-area-inset-bottom,0px));max-height:80dvh;overflow-y:auto;animation:sup .28s cubic-bezier(.34,1.56,.64,1)}
@keyframes sup{from{transform:translateY(100%)}to{transform:translateY(0)}}
.shandle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 16px}
.shtit{font-family:'Syne',sans-serif;font-size:.95rem;font-weight:700;margin-bottom:16px}
/* buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:11px 16px;border-radius:10px;font-family:'Syne',sans-serif;font-size:.82rem;font-weight:700;letter-spacing:.04em;cursor:pointer;border:none;text-transform:uppercase;width:100%}
.btn:active{opacity:.8}
.btn-a{background:var(--accent);color:#0a0a0c}
.btn-o{background:none;border:1.5px solid var(--border);color:var(--text)}
.btn-d{background:rgba(255,60,60,.12);border:1px solid rgba(255,60,60,.3);color:#ff6060}
.btn-g{background:rgba(61,220,132,.15);border:1px solid rgba(61,220,132,.3);color:var(--green)}
.btn:disabled{opacity:.35;pointer-events:none}
/* export progress */
.exp-wrap{padding:16px}
.prog-bar{width:100%;height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin:10px 0}
.prog-fill{height:100%;background:var(--accent);border-radius:3px;transition:width .3s;width:0%}
.prog-label{font-size:.78rem;color:var(--muted);text-align:center}
/* bnav */
.bnav{display:flex;background:rgba(10,10,12,.96);backdrop-filter:blur(16px);border-top:1px solid var(--border);padding-bottom:max(8px,env(safe-area-inset-bottom,0px));flex-shrink:0}
.nitem{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:10px 4px 6px;cursor:pointer;color:var(--muted);font-size:.6rem;font-family:'Syne',sans-serif;font-weight:700;letter-spacing:.06em;text-transform:uppercase}
.nitem .ni{font-size:1.3rem;line-height:1}
.nitem.active{color:var(--accent)}
.nitem:active{opacity:.6}
.page{display:none}.page.active{display:block}
/* toast */
.toast{position:fixed;bottom:max(80px,calc(60px + 16px));left:50%;transform:translateX(-50%) translateY(20px);background:var(--s2);border:1px solid var(--border);border-radius:20px;padding:9px 18px;font-size:.82rem;white-space:nowrap;opacity:0;transition:all .3s cubic-bezier(.34,1.56,.64,1);z-index:999;pointer-events:none;max-width:90vw;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.ok{border-color:var(--accent);color:var(--accent)}
.toast.err{border-color:var(--a2);color:var(--a2)}
::-webkit-scrollbar{display:none}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="logo">✈ Travel<span>Edit</span></div>
    <div class="tbr">
      <div class="ibtn" onclick="exportVideo()" title="動画書き出し">🎬</div>
      <div class="ibtn" onclick="if(confirm('全クリア？'))clearAll()">🗑</div>
    </div>
  </div>

  <div class="content" id="contentArea">

    <!-- 素材ページ -->
    <div class="page active" id="page-media">
      <div class="pvwrap">
        <div class="pvempty" id="pvempty"><div class="ei">🎬</div><p>素材を追加して<br>タイムラインを生成しよう</p></div>
        <img id="pvimg" src="" alt="">
        <video id="pvvid" controls muted playsinline></video>
        <div class="tlov" id="pvtlov"><div class="tt" id="pvtltxt"></div></div>
        <div class="wmlabel" id="pvwm">✈ Travel Vlog</div>
      </div>
      <div class="pvnav">
        <button class="pnbtn" onclick="navClip(-1)">◀ 前</button>
        <button class="pnbtn" onclick="navClip(1)">次 ▶</button>
        <span class="ccount" id="ccount">0 クリップ</span>
      </div>

      <div class="sec">
        <div class="shead">
          <span class="stit">📁 素材</span>
          <span class="sact" onclick="document.getElementById('fi').click()">＋ 追加</span>
        </div>
        <input type="file" id="fi" multiple accept="image/*,video/*" style="display:none" onchange="onFiles(this.files);this.value=''">
        <div class="upz" id="upz" onclick="document.getElementById('fi').click()">
          <div class="upicon">📸</div>
          <p><strong>タップ</strong>して写真・動画を選択<br><span style="font-size:.72rem">JPG / PNG / MP4 / MOV など</span></p>
        </div>
        <div class="mscr" id="mscr"></div>
      </div>

      <div class="sec">
        <div class="shead">
          <span class="stit">⏱ タイムライン</span>
          <span class="sact" onclick="buildTL()">⚡ 自動生成</span>
        </div>
        <div class="tlscr" id="tlscr">
          <span class="tlempty" id="tlempty">「自動生成」で並び順を作成</span>
        </div>
        <div style="display:flex;gap:8px;margin-top:8px">
          <button class="btn btn-o" style="font-size:.72rem" onclick="addTitleClip()">＋ タイトル挿入</button>
        </div>
      </div>

      <!-- export section -->
      <div class="sec" id="expSec" style="display:none">
        <div class="shead"><span class="stit">🎬 動画書き出し</span></div>
        <button class="btn btn-g" onclick="exportVideo()" id="expBtn">🎬 動画を書き出す</button>
        <div id="expProgress" style="display:none">
          <div class="prog-bar"><div class="prog-fill" id="progFill"></div></div>
          <div class="prog-label" id="progLabel">準備中...</div>
        </div>
        <p style="font-size:.7rem;color:var(--muted);margin-top:8px;line-height:1.5;text-align:center">WebMまたはMP4形式でダウンロードします<br>スマホでは数分かかる場合があります</p>
      </div>
    </div>

    <!-- 設定ページ -->
    <div class="page" id="page-settings">
      <div class="sec">
        <div class="stit" style="margin-bottom:14px">🎬 動画設定</div>
        <div class="field"><label>タイトル</label><input type="text" id="inTitle" placeholder="My Travel Vlog"></div>
        <div class="field"><label>サブタイトル</label><input type="text" id="inSub" placeholder="Summer 2025"></div>
        <div class="field"><label>ウォーターマーク</label><input type="text" id="inWm" placeholder="✈ Travel Vlog"></div>
        <div class="field">
          <label>写真1枚の表示時間: <span id="sllbl">3秒</span></label>
          <input type="range" min="1" max="8" value="3" step="0.5" id="inSl" oninput="document.getElementById('sllbl').textContent=this.value+'秒'">
        </div>
      </div>

      <div class="sec">
        <div class="stit" style="margin-bottom:14px">🎵 BGM</div>
        <p style="font-size:.75rem;color:var(--muted);margin-bottom:12px;line-height:1.5">プリセットから選ぶか、自分でアップロード</p>
        <div class="bgm-grid" id="bgmGrid"></div>
        <div class="bgm-upload-also" onclick="document.getElementById('bgmfi').click()">
          <input type="file" id="bgmfi" accept="audio/*" style="position:absolute;inset:0;opacity:0;width:100%" onchange="onBGMUpload(this.files)">
          <p>📂 自分のBGMをアップロード</p>
        </div>
        <div id="bgmok" class="bgm-ok" style="display:none"></div>
        <div id="bgmvolwrap" style="display:none;margin-top:12px">
          <div class="field">
            <label>BGM音量: <span id="vollbl">40</span>%</label>
            <input type="range" min="0" max="100" value="40" id="inVol" oninput="document.getElementById('vollbl').textContent=this.value">
          </div>
        </div>
      </div>
    </div>

  </div><!-- /content -->

  <div class="bnav">
    <div class="nitem active" id="nav-media" onclick="switchPage('media')"><span class="ni">📽</span>素材</div>
    <div class="nitem" id="nav-settings" onclick="switchPage('settings')"><span class="ni">⚙️</span>設定</div>
  </div>
</div>

<!-- クリップ詳細シート -->
<div class="shov" id="shov" onclick="closeSheet(event)">
  <div class="sheet">
    <div class="shandle"></div>
    <div class="shtit" id="shtit"></div>
    <div id="shbody"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── STATE ──────────────────────────────────────────────────────────────────
const S={media:[],tl:[],bgmBuf:null,bgmName:'',idx:0,selectedBgm:null};
let mid=0,cid=0;
let previewAudio=null;

// ── BGM PRESETS (Web Audio API で生成) ─────────────────────────────────────
const BGM_PRESETS=[
  {id:'chill',name:'Chill Wave',desc:'のんびり旅行気分',bpm:85,color:'#3ddc84',
   gen:(ctx,dur)=>genBGM(ctx,dur,{base:220,chords:[0,4,7,11],tempo:85,style:'chill'})},
  {id:'adventure',name:'Adventure',desc:'アクティブな冒険',bpm:128,color:'#ff5c35',
   gen:(ctx,dur)=>genBGM(ctx,dur,{base:165,chords:[0,3,7,10],tempo:128,style:'adventure'})},
  {id:'cinematic',name:'Cinematic',desc:'映画のような壮大さ',bpm:60,color:'#5b8cff',
   gen:(ctx,dur)=>genBGM(ctx,dur,{base:130,chords:[0,4,7,9],tempo:60,style:'cinematic'})},
  {id:'upbeat',name:'Upbeat Pop',desc:'明るくポップな旅',bpm:110,color:'#c8ff00',
   gen:(ctx,dur)=>genBGM(ctx,dur,{base:196,chords:[0,4,7,12],tempo:110,style:'upbeat'})},
];

// Web Audio で BGM 生成
function genBGM(ctx,duration,{base,chords,tempo,style}){
  const buf=ctx.createBuffer(2,ctx.sampleRate*duration,ctx.sampleRate);
  const spb=60/tempo; // seconds per beat

  for(let ch=0;ch<2;ch++){
    const d=buf.getChannelData(ch);
    for(let i=0;i<d.length;i++){
      const t=i/ctx.sampleRate;
      const beat=Math.floor(t/spb);
      const beatPos=(t%spb)/spb;
      const chord=chords[beat%chords.length];
      const freq=base*Math.pow(2,chord/12);
      const freq2=base*Math.pow(2,(chord+7)/12);
      const freq3=base*Math.pow(2,(chord+12)/12)*0.5;

      let s=0;
      // bass
      s+=Math.sin(2*Math.PI*freq*0.5*t)*0.18*Math.exp(-beatPos*0.8);
      // pad
      s+=Math.sin(2*Math.PI*freq*t)*0.08;
      s+=Math.sin(2*Math.PI*freq2*t)*0.06;
      s+=Math.sin(2*Math.PI*freq3*t)*0.04;
      // melody variation by style
      if(style==='upbeat'||style==='adventure'){
        const mf=base*Math.pow(2,((beat*5)%12)/12)*2;
        s+=Math.sin(2*Math.PI*mf*t)*0.05*Math.sin(Math.PI*beatPos);
      }
      if(style==='cinematic'){
        s+=Math.sin(2*Math.PI*freq*1.5*t)*0.03*Math.sin(Math.PI*t/4);
      }
      // hi-hat like click for upbeat
      if(style==='upbeat'&&beatPos<0.05){
        s+=(Math.random()*2-1)*0.04;
      }
      // subtle stereo
      s*=(ch===0)?1+Math.sin(t*0.7)*0.05:1+Math.cos(t*0.7)*0.05;
      // fade in/out
      const fade=Math.min(t/2,(duration-t)/2,1);
      d[i]=s*fade*0.7;
    }
  }
  return buf;
}

async function renderBGMPreset(preset,duration=30){
  const ctx=new (window.AudioContext||window.webkitAudioContext)({sampleRate:44100});
  const buf=preset.gen(ctx,duration);
  await ctx.close();
  return buf;
}

function audioBufferToWav(buf){
  const numCh=buf.numberOfChannels,sr=buf.sampleRate,numSamples=buf.length;
  const bitsPerSample=16,byteRate=sr*numCh*bitsPerSample/8;
  const dataSize=numSamples*numCh*2;
  const ab=new ArrayBuffer(44+dataSize);
  const view=new DataView(ab);
  function ws(off,str){for(let i=0;i<str.length;i++)view.setUint8(off+i,str.charCodeAt(i));}
  ws(0,'RIFF');view.setUint32(4,36+dataSize,true);ws(8,'WAVE');
  ws(12,'fmt ');view.setUint32(16,16,true);view.setUint16(20,1,true);
  view.setUint16(22,numCh,true);view.setUint32(24,sr,true);
  view.setUint32(28,byteRate,true);view.setUint16(32,numCh*bitsPerSample/8,true);
  view.setUint16(34,bitsPerSample,true);ws(36,'data');view.setUint32(40,dataSize,true);
  let off=44;
  for(let i=0;i<numSamples;i++){
    for(let c=0;c<numCh;c++){
      const s=Math.max(-1,Math.min(1,buf.getChannelData(c)[i]));
      view.setInt16(off,s<0?s*0x8000:s*0x7FFF,true);off+=2;
    }
  }
  return ab;
}

// ── BUILD BGM GRID ─────────────────────────────────────────────────────────
function buildBGMGrid(){
  const grid=document.getElementById('bgmGrid');
  grid.innerHTML='';
  BGM_PRESETS.forEach(p=>{
    const card=document.createElement('div');
    card.className='bgm-card';
    card.dataset.id=p.id;
    card.innerHTML=`
      <div class="bcname">${p.name}</div>
      <div class="bcbpm">${p.bpm}BPM</div>
      <div class="bcdesc">${p.desc}</div>
      <button class="bcplay" onclick="previewBGM('${p.id}',event)">▶ 試聴</button>`;
    card.addEventListener('click',(e)=>{
      if(e.target.classList.contains('bcplay'))return;
      selectBGMPreset(p.id);
    });
    grid.appendChild(card);
  });
}

function selectBGMPreset(id){
  S.selectedBgm=id;
  S.bgmBuf=null; // preset chosen, not uploaded
  document.querySelectorAll('.bgm-card').forEach(c=>{
    c.classList.toggle('selected',c.dataset.id===id);
  });
  const p=BGM_PRESETS.find(x=>x.id===id);
  document.getElementById('bgmok').style.display='block';
  document.getElementById('bgmok').textContent='🎵 '+p.name+' を選択中';
  document.getElementById('bgmvolwrap').style.display='block';
  toast(p.name+'を選択 🎵','ok');
}

async function previewBGM(id,e){
  e.stopPropagation();
  if(previewAudio){previewAudio.pause();previewAudio=null;}
  toast('試聴中...','');
  const p=BGM_PRESETS.find(x=>x.id===id);
  const buf=await renderBGMPreset(p,8);
  const wav=audioBufferToWav(buf);
  const blob=new Blob([wav],{type:'audio/wav'});
  const url=URL.createObjectURL(blob);
  previewAudio=new Audio(url);
  previewAudio.play();
  previewAudio.onended=()=>{previewAudio=null;};
}

function onBGMUpload(files){
  if(!files[0])return;
  S.bgmBuf=null;S.selectedBgm=null;
  const fr=new FileReader();
  fr.onload=e=>{
    S.bgmBuf=e.target.result;
    S.bgmName=files[0].name;
  };
  fr.readAsArrayBuffer(files[0]);
  document.querySelectorAll('.bgm-card').forEach(c=>c.classList.remove('selected'));
  document.getElementById('bgmok').style.display='block';
  document.getElementById('bgmok').textContent='🎵 '+files[0].name;
  document.getElementById('bgmvolwrap').style.display='block';
  toast('BGMをアップロード 🎵','ok');
}

// ── PAGES ──────────────────────────────────────────────────────────────────
function switchPage(name){
  ['media','settings'].forEach(n=>{
    document.getElementById('page-'+n).classList.toggle('active',n===name);
    document.getElementById('nav-'+n).classList.toggle('active',n===name);
  });
  document.getElementById('contentArea').scrollTop=0;
}

// ── FILES ──────────────────────────────────────────────────────────────────
function onFiles(files){
  let n=0;
  Array.from(files).forEach(f=>{
    if(!f.type.match(/^(image|video)\//))return;
    const isImg=f.type.startsWith('image/');
    const id=++mid;
    const item={id,name:f.name,type:isImg?'photo':'video',src:'',duration:0};
    S.media.push(item);n++;
    const fr=new FileReader();
    fr.onload=e=>{
      item.src=e.target.result;
      if(!isImg){
        const v=document.createElement('video');
        v.onloadedmetadata=()=>{item.duration=v.duration;renderMedia();};
        v.src=item.src;
      }
      renderMedia();
    };
    fr.readAsDataURL(f);
  });
  if(n)toast(n+'件追加 🎉','ok');
}

// ── MEDIA GRID ─────────────────────────────────────────────────────────────
function renderMedia(){
  const sc=document.getElementById('mscr');sc.innerHTML='';
  S.media.forEach(item=>{
    const d=document.createElement('div');d.className='mth';
    if(item.src){
      const el=document.createElement(item.type==='photo'?'img':'video');
      el.src=item.src;if(item.type==='video')el.preload='metadata';
      d.appendChild(el);
    }
    const b=document.createElement('span');b.className='tbadge '+item.type;
    b.textContent=item.type==='photo'?'PHO':'VID';d.appendChild(b);
    const rm=document.createElement('button');rm.className='trm';rm.textContent='✕';
    rm.onclick=e=>{e.stopPropagation();rmMedia(item.id);};d.appendChild(rm);
    if(item.duration){const dur=document.createElement('span');dur.className='tdur';dur.textContent=fmtDur(item.duration);d.appendChild(dur);}
    d.onclick=()=>previewItem(item);sc.appendChild(d);
  });
}
function rmMedia(id){S.media=S.media.filter(m=>m.id!==id);S.tl=S.tl.filter(c=>c.mediaId!==id);renderMedia();renderTL();}

// ── PREVIEW ────────────────────────────────────────────────────────────────
function previewItem(item){
  document.getElementById('pvempty').style.display='none';
  document.getElementById('pvtlov').style.display='none';
  document.getElementById('pvwm').style.display='block';
  document.getElementById('pvwm').textContent=document.getElementById('inWm').value||'✈ Travel Vlog';
  if(item.type==='photo'){
    document.getElementById('pvimg').src=item.src;
    document.getElementById('pvimg').style.display='block';
    document.getElementById('pvvid').style.display='none';
  } else {
    document.getElementById('pvvid').src=item.src;
    document.getElementById('pvvid').style.display='block';
    document.getElementById('pvimg').style.display='none';
  }
}
function previewClip(clip){
  if(clip.kind==='title'){
    document.getElementById('pvempty').style.display='none';
    document.getElementById('pvimg').style.display='none';
    document.getElementById('pvvid').style.display='none';
    document.getElementById('pvwm').style.display='none';
    document.getElementById('pvtltxt').textContent=clip.label;
    document.getElementById('pvtlov').style.display='flex';return;
  }
  const item=S.media.find(m=>m.id===clip.mediaId);
  if(item&&item.src)previewItem(item);
}
function navClip(dir){
  if(!S.tl.length)return;
  S.idx=(S.idx+dir+S.tl.length)%S.tl.length;
  previewClip(S.tl[S.idx]);hlClip(S.tl[S.idx].id);
}

// ── TIMELINE ───────────────────────────────────────────────────────────────
function buildTL(){
  if(!S.media.length){toast('素材を先に追加！','err');return;}
  S.tl=[];
  const title=document.getElementById('inTitle').value||'My Travel Vlog';
  const sub=document.getElementById('inSub').value;
  S.tl.push({id:++cid,kind:'title',label:title+(sub?' / '+sub:''),mediaId:null});
  const sl=parseFloat(document.getElementById('inSl').value)||3;
  S.media.filter(m=>m.type==='photo').forEach(p=>S.tl.push({id:++cid,kind:'photo',mediaId:p.id,label:p.name,slideLen:sl}));
  S.media.filter(m=>m.type==='video').forEach(v=>S.tl.push({id:++cid,kind:'video',mediaId:v.id,label:v.name,trimStart:0,trimEnd:v.duration}));
  renderTL();
  document.getElementById('expSec').style.display='block';
  toast('タイムライン生成 ✅','ok');
  if(S.tl.length){S.idx=0;previewClip(S.tl[0]);}
}

function renderTL(){
  const sc=document.getElementById('tlscr'),em=document.getElementById('tlempty');
  document.getElementById('ccount').textContent=S.tl.length+' クリップ';
  if(!S.tl.length){sc.innerHTML='';sc.appendChild(em);document.getElementById('expSec').style.display='none';return;}
  if(em.parentNode===sc)sc.removeChild(em);
  sc.innerHTML='';
  S.tl.forEach(clip=>{
    const d=document.createElement('div');
    d.className='tlc c-'+(clip.kind==='title'?'title':clip.kind);
    d.dataset.cid=clip.id;
    const icon={title:'🅣',photo:'📷',video:'🎥'}[clip.kind]||'●';
    const nm=clip.label.length>12?clip.label.slice(0,12)+'…':clip.label;
    const s1=document.createElement('span');s1.textContent=icon;
    const s2=document.createElement('span');s2.textContent=nm;
    const rm=document.createElement('button');rm.className='tlrm';rm.textContent='✕';
    rm.onclick=e=>{e.stopPropagation();rmClip(clip.id);};
    d.append(s1,s2,rm);
    d.style.width=clip.kind==='video'?Math.max(72,Math.min((clip.trimEnd||10)*10,160))+'px':clip.kind==='title'?'80px':'64px';
    d.onclick=()=>{openSheet(clip);hlClip(clip.id);previewClip(clip);};
    sc.appendChild(d);
  });
}
function hlClip(id){document.querySelectorAll('.tlc').forEach(el=>el.classList.toggle('act',+el.dataset.cid===id));}
function rmClip(id){S.tl=S.tl.filter(c=>c.id!==id);renderTL();}

function addTitleClip(){
  // タイトルテキストを入力してから追加
  const label=prompt('タイトルテキストを入力','Chapter');
  if(label===null)return;
  S.tl.push({id:++cid,kind:'title',label:label||'Chapter',mediaId:null});
  renderTL();
  toast('タイトル追加 ✅','ok');
}

// ── CLIP SHEET ─────────────────────────────────────────────────────────────
function openSheet(clip){
  const item=clip.mediaId?S.media.find(m=>m.id===clip.mediaId):null;
  document.getElementById('shtit').textContent=clip.kind==='title'?'📝 タイトル':clip.kind==='photo'?'📷 写真':'🎥 動画';
  let h='';
  if(clip.kind==='title'){
    h=`<div class="field"><label>テキスト</label><input type="text" id="sh_label" value="${clip.label.replace(/"/g,'&quot;')}" oninput="updLabel(${clip.id},this.value)"></div>`;
  } else if(clip.kind==='photo'){
    h=`<div class="field"><label>表示時間(秒)</label><input type="number" min="0.5" step="0.5" value="${clip.slideLen||3}" oninput="updSlide(${clip.id},+this.value)"></div>`;
  } else {
    h=`<div class="field"><label>開始(秒)</label><input type="number" min="0" step="0.5" value="${clip.trimStart||0}" oninput="updTrim(${clip.id},'s',+this.value);renderTL()"></div>
       <div class="field"><label>終了(秒)</label><input type="number" min="0" step="0.5" value="${clip.trimEnd||item?.duration||0}" oninput="updTrim(${clip.id},'e',+this.value);renderTL()"></div>
       <div style="font-size:.78rem;color:var(--muted);margin-bottom:14px">元の長さ: ${item?.duration?fmtDur(item.duration):'-'}</div>`;
  }
  h+=`<div style="display:flex;gap:8px;margin-top:4px">
    <button class="btn btn-o" style="font-size:.75rem" onclick="moveClip(${clip.id},-1);renderTL()">← 前へ</button>
    <button class="btn btn-o" style="font-size:.75rem" onclick="moveClip(${clip.id},1);renderTL()">後へ →</button>
  </div>
  <button class="btn btn-d" style="margin-top:10px;font-size:.75rem" onclick="rmClip(${clip.id});closeSheet()">削除</button>`;
  document.getElementById('shbody').innerHTML=h;
  document.getElementById('shov').classList.add('open');
}
function closeSheet(e){if(e&&e.target!==document.getElementById('shov'))return;document.getElementById('shov').classList.remove('open');}
function updLabel(id,v){const c=S.tl.find(c=>c.id===id);if(c){c.label=v;renderTL();}}
function updSlide(id,v){const c=S.tl.find(c=>c.id===id);if(c)c.slideLen=v;}
function updTrim(id,k,v){const c=S.tl.find(c=>c.id===id);if(c){if(k==='s')c.trimStart=v;else c.trimEnd=v;}}
function moveClip(id,dir){
  const i=S.tl.findIndex(c=>c.id===id);if(i<0)return;
  const ni=i+dir;if(ni<0||ni>=S.tl.length)return;
  [S.tl[i],S.tl[ni]]=[S.tl[ni],S.tl[i]];renderTL();
}

// ── VIDEO EXPORT (Canvas + MediaRecorder) ──────────────────────────────────
async function exportVideo(){
  if(!S.tl.length){toast('タイムラインが空です','err');return;}

  const expBtn=document.getElementById('expBtn');
  const expProgress=document.getElementById('expProgress');
  const progFill=document.getElementById('progFill');
  const progLabel=document.getElementById('progLabel');

  expBtn.disabled=true;
  expProgress.style.display='block';

  const W=1280,H=720,FPS=30;
  const canvas=document.createElement('canvas');
  canvas.width=W;canvas.height=H;
  const ctx=canvas.getContext('2d');

  // BGM setup
  let audioCtx=null,bgmSource=null,bgmGain=null,dest=null;
  const hasBGM=S.selectedBgm||S.bgmBuf;
  if(hasBGM){
    audioCtx=new (window.AudioContext||window.webkitAudioContext)({sampleRate:44100});
    dest=audioCtx.createMediaStreamDestination();
    bgmGain=audioCtx.createGain();
    bgmGain.gain.value=(document.getElementById('inVol').value||40)/100;
    bgmGain.connect(dest);
  }

  // MediaRecorder
  const tracks=[canvas.captureStream(FPS).getVideoTracks()[0]];
  if(dest)tracks.push(...dest.stream.getAudioTracks());
  const stream=new MediaStream(tracks);

  const mimeType=MediaRecorder.isTypeSupported('video/webm;codecs=vp9,opus')?'video/webm;codecs=vp9,opus':
                 MediaRecorder.isTypeSupported('video/webm')?'video/webm':'video/mp4';
  const recorder=new MediaRecorder(stream,{mimeType,videoBitsPerSecond:4000000});
  const chunks=[];
  recorder.ondataavailable=e=>{if(e.data.size>0)chunks.push(e.data);};

  // Calculate total duration
  const sl=parseFloat(document.getElementById('inSl').value)||3;
  let totalDur=0;
  S.tl.forEach(c=>{
    if(c.kind==='title')totalDur+=3;
    else if(c.kind==='photo')totalDur+=c.slideLen||sl;
    else totalDur+=(c.trimEnd||0)-(c.trimStart||0);
  });

  recorder.start(100);

  // Start BGM
  if(hasBGM&&audioCtx){
    let bgmAudioBuf;
    if(S.selectedBgm){
      const preset=BGM_PRESETS.find(p=>p.id===S.selectedBgm);
      bgmAudioBuf=await renderBGMPreset(preset,totalDur+2);
    } else {
      bgmAudioBuf=await audioCtx.decodeAudioData(S.bgmBuf.slice(0));
    }
    bgmSource=audioCtx.createBufferSource();
    bgmSource.buffer=bgmAudioBuf;
    bgmSource.loop=true;
    bgmSource.connect(bgmGain);
    bgmSource.start();
  }

  // Draw each clip
  let done=0;
  for(let ci=0;ci<S.tl.length;ci++){
    const clip=S.tl[ci];
    progLabel.textContent=`処理中 ${ci+1}/${S.tl.length}...`;

    if(clip.kind==='title'){
      await drawTitle(ctx,W,H,clip.label,3,FPS,progFill,done,totalDur);
      done+=3;
    } else if(clip.kind==='photo'){
      const item=S.media.find(m=>m.id===clip.mediaId);
      if(!item){done+=(clip.slideLen||sl);continue;}
      await drawPhoto(ctx,W,H,item.src,clip.slideLen||sl,FPS,progFill,done,totalDur);
      done+=clip.slideLen||sl;
    } else {
      const item=S.media.find(m=>m.id===clip.mediaId);
      if(!item){done+=(clip.trimEnd||0)-(clip.trimStart||0);continue;}
      const dur=(clip.trimEnd||0)-(clip.trimStart||0);
      await drawVideoClip(ctx,W,H,item.src,clip.trimStart||0,clip.trimEnd||0,FPS,progFill,done,totalDur);
      done+=dur;
    }
  }

  // Stop
  if(bgmSource)bgmSource.stop();
  if(audioCtx)await audioCtx.close();
  recorder.stop();

  recorder.onstop=()=>{
    const blob=new Blob(chunks,{type:mimeType});
    const ext=mimeType.includes('mp4')?'mp4':'webm';
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download=`travel_vlog.${ext}`;
    a.click();
    expBtn.disabled=false;
    expProgress.style.display='none';
    progFill.style.width='0%';
    toast('動画書き出し完了 🎉','ok');
  };
}

function setProgress(fill,done,total){
  fill.style.width=Math.min(100,Math.round(done/total*100))+'%';
}

async function drawTitle(ctx,W,H,text,dur,fps,fill,done,total){
  const frames=Math.round(dur*fps);
  for(let f=0;f<frames;f++){
    const t=f/fps;
    const alpha=Math.min(t/0.5,(dur-t)/0.5,1);
    ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);
    ctx.globalAlpha=alpha;
    ctx.fillStyle='#fff';
    ctx.font=`bold ${Math.round(H*0.08)}px 'Syne',sans-serif`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(text,W/2,H/2);
    ctx.globalAlpha=1;
    setProgress(fill,done+t,total);
    await frame();
  }
}

async function drawPhoto(ctx,W,H,src,dur,fps,fill,done,total){
  const img=await loadImg(src);
  const frames=Math.round(dur*fps);
  for(let f=0;f<frames;f++){
    const t=f/fps;
    const alpha=Math.min(t/0.4,(dur-t)/0.4,1);
    ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);
    ctx.globalAlpha=alpha;
    drawFit(ctx,img,W,H);
    // watermark
    const wm=document.getElementById('inWm').value||'✈ Travel Vlog';
    ctx.font=`${Math.round(H*0.025)}px 'DM Sans',sans-serif`;
    ctx.fillStyle='rgba(255,255,255,0.5)';
    ctx.textAlign='right';ctx.textBaseline='bottom';
    ctx.fillText(wm,W-16,H-10);
    ctx.globalAlpha=1;
    setProgress(fill,done+t,total);
    await frame();
  }
}

async function drawVideoClip(ctx,W,H,src,start,end,fps,fill,done,total){
  return new Promise(resolve=>{
    const vid=document.createElement('video');
    vid.src=src;vid.muted=true;vid.playsInline=true;
    vid.currentTime=start;
    const dur=end-start;
    const wm=document.getElementById('inWm').value||'✈ Travel Vlog';
    let started=false;

    vid.onseeked=async()=>{
      if(started)return;started=true;
      vid.play();
      const t0=performance.now();
      const draw=async()=>{
        const elapsed=(performance.now()-t0)/1000;
        if(elapsed>=dur||vid.ended){
          vid.pause();resolve();return;
        }
        ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);
        drawFit(ctx,vid,W,H);
        ctx.font=`${Math.round(H*0.025)}px 'DM Sans',sans-serif`;
        ctx.fillStyle='rgba(255,255,255,0.5)';
        ctx.textAlign='right';ctx.textBaseline='bottom';
        ctx.fillText(wm,W-16,H-10);
        setProgress(fill,done+elapsed,total);
        await frame();
        requestAnimationFrame(draw);
      };
      requestAnimationFrame(draw);
    };
    vid.load();
  });
}

function loadImg(src){
  return new Promise((res,rej)=>{
    const img=new Image();img.onload=()=>res(img);img.onerror=rej;img.src=src;
  });
}

function drawFit(ctx,el,W,H){
  const ew=el.videoWidth||el.naturalWidth||el.width;
  const eh=el.videoHeight||el.naturalHeight||el.height;
  if(!ew||!eh)return;
  const scale=Math.min(W/ew,H/eh);
  const dw=ew*scale,dh=eh*scale;
  ctx.drawImage(el,(W-dw)/2,(H-dh)/2,dw,dh);
}

function frame(){return new Promise(r=>setTimeout(r,1000/30));}

// ── MISC ───────────────────────────────────────────────────────────────────
function clearAll(){
  S.media=[];S.tl=[];S.bgmBuf=null;S.selectedBgm=null;
  renderMedia();renderTL();
  document.getElementById('bgmok').style.display='none';
  document.getElementById('bgmvolwrap').style.display='none';
  document.querySelectorAll('.bgm-card').forEach(c=>c.classList.remove('selected'));
  document.getElementById('pvempty').style.display='flex';
  document.getElementById('pvimg').style.display='none';
  document.getElementById('pvvid').style.display='none';
  document.getElementById('pvtlov').style.display='none';
  document.getElementById('expSec').style.display='none';
  toast('クリア完了','ok');
}

function fmtDur(s){const m=Math.floor(s/60),sc=Math.floor(s%60);return`${m}:${String(sc).padStart(2,'0')}`;}

let toastT;
function toast(msg,type=''){
  const el=document.getElementById('toast');
  el.textContent=msg;el.className=`toast show ${type}`;
  clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove('show'),3000);
}

// drag-drop
const uz=document.getElementById('upz');
uz.addEventListener('dragover',e=>{e.preventDefault();uz.classList.add('drag-over');});
uz.addEventListener('dragleave',()=>uz.classList.remove('drag-over'));
uz.addEventListener('drop',e=>{e.preventDefault();uz.classList.remove('drag-over');onFiles(e.dataTransfer.files);});

// init
buildBGMGrid();
